name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install yt-dlp pyinstaller

      - name: Build exe
        run: python -m PyInstaller VideoDownloader.spec --noconfirm

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory package\VideoDownloader | Out-Null
          Copy-Item dist\VideoDownloader.exe package\VideoDownloader\
          Compress-Archive -Path package\VideoDownloader -DestinationPath VideoDownloader.zip

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "${{ github.ref_name }}"
          VideoDownloader.zip
          --title "Video Downloader ${{ github.ref_name }}"
          --generate-notes
